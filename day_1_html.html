<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: transparent; }
  #hdr {
    font-family: Calibri, sans-serif;
    font-size: 30px;
    font-weight: bold;
    color: #ffffff;
    text-align: center;
    padding: 8px 12px;
    border-radius: 4px;
  }
</style>
</head>
<body>
  <div id="hdr"></div>
  <script>
    var d = new Date();
    d.setDate(d.getDate() + 2);
    var label = d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
    document.getElementById('hdr').innerHTML =
      "6 Hr to 24 Hour (Day 1 \u00B7 " + label + ")<br>Threat Outlook Page";
  </script>
</body>
</html>
