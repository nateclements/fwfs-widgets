<!DOCTYPE html>
<html>
<head>
<style>
  /* 1. Reset defaults and force the canvas to fill the iframe 100% */
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }
  
  /* 2. Flexbox container guarantees the header stays perfectly centered vertically and horizontally */
  .banner-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    text-align: center;
    box-sizing: border-box;
    padding: 4px 8px;
  }

  /* 3. Fluid font pricing using calc() and vw (Viewport Width) */
  #hdr {
    font-family: Calibri, sans-serif;
    /* Dynamically scales font size based on screen width so it never overflows */
    font-size: calc(16px + 1vw); 
    font-weight: bold;
    color: #ffffff;
    line-height: 1.25;
    white-space: nowrap; /* Forces "Day 2..." to stay cleanly on its own line */
  }

  /* 4. Controls the styling for the darkened bottom line */
  .subtitle {
    color: #adabaa; /* The exact medium-gray from the previous design */
    font-size: calc(16px + 1vw); /* Scales down proportionally */
    font-weight: normal;
    display: block;
    margin-top: 4px;
  }
</style>
</head>
<body>

  <div class="banner-container">
    <div id="hdr"></div>
  </div>

  <script>
    var d = new Date();
    d.setDate(d.getDate() + 1); // Day 2 calculation
    var label = d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
    
    // Injects the title and wraps the bottom text in the newly defined gray subtitle class
    document.getElementById('hdr').innerHTML =
      "Day 2 (24 Hr &middot; " + label + ")<span class='subtitle'>Threat Outlook Page</span>";
  </script>
</body>
</html>
