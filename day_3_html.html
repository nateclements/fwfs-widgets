<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }
  
  /* Flexbox wrapper forces the text to remain perfectly centered globally */
  .banner-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    text-align: center;
    box-sizing: border-box;
  }

  #hdr {
    font-family: Calibri, sans-serif;
    /* Use vw (viewport width) so font size dynamically shrinks/grows with the screen scale */
    font-size: calc(16px + 1vw); 
    font-weight: bold;
    color: #ffffff;
    line-height: 1.2;
    white-space: nowrap; /* Prevents awkward single-word wrapping */
  }

  .subtitle {
    color: #adabaa;
    font-size: calc(14px + 1.0vw);
    font-weight: normal;
    display: block;
    margin-top: 4px;
  }
</style>
</head>
<body>

  <div class="banner-container">
    <div id="hdr"></div>
  </div>

  <script>
    var d = new Date();
    d.setDate(d.getDate() + 2);
    var label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    
    document.getElementById('hdr').innerHTML = 
      "Day 3 (48 Hr &middot; " + label + ")<span class='subtitle'>Threat Outlook Page</span>";
  </script>
</body>
</html>
